<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Mahasiswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container mt-5">

    <!-- TOPBAR -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>🎓 Dashboard Mahasiswa</h3>

        <div>
            {% if user.is_authenticated %}
                <span class="me-3">👤 {{ user.username }}</span>

                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button class="btn btn-danger btn-sm">Logout</button>
                </form>
            {% endif %}
        </div>
    </div>

    <!-- STATISTIK -->
    <div class="row text-center mb-4">

        <div class="col-md-6">
            <div class="card bg-primary p-4">
                <h5>Total Mata Kuliah</h5>
                <h2>{{ total_courses }}</h2>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card bg-success p-4">
                <h5>Mata Kuliah Saya</h5>
                <h2>{{ my_courses }}</h2>
            </div>
        </div>

    </div>

    <!-- MENU -->
    <div class="text-center">
        <a href="{% url 'krs' %}" class="btn btn-lg btn-warning me-2">
            📚 Ambil Mata Kuliah (KRS)
        </a>
        <a href="{% url 'materi' %}" class="btn btn-lg btn-info">
            📖 Materi Saya
        </a>
    </div>

</div>

</body>
</html>
