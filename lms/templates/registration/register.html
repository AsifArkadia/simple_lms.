{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Daftar · LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="{% static 'lms/css/admin.css' %}" rel="stylesheet">

    <style>
        body.lms-login-bg {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, #312e81 0%, #111827 55%, #0b0f19 100%);
        }

        .lms-login-card {
            width: 100%;
            max-width: 420px;
            padding: 2.25rem 2rem;
        }

        .lms-login-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(79, 70, 229, 0.12);
            color: var(--c-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 1rem;
        }

        .lms-login-card .form-control {
            padding-top: 0.6rem;
            padding-bottom: 0.6rem;
            border-left: none;
        }

        .lms-login-card .input-group-text {
            background: #f9fafb;
            border-right: none;
            color: var(--c-text-muted);
        }

        .lms-login-card .input-group:focus-within .input-group-text {
            border-color: var(--c-primary);
        }
    </style>
</head>
<body class="lms-login-bg">

<div class="lms-card lms-login-card">

    <div class="lms-login-avatar"><i class="bi bi-person-plus-fill"></i></div>

    <h4 class="text-center lms-page-title mb-1">Daftar Akun Baru</h4>
    <p class="text-center lms-page-subtitle mb-4">Buat akun untuk mulai belajar di Simple LMS</p>

    {% if messages %}
        {% for message in messages %}
        <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-success{% endif %} py-2 small">
            <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ message }}
        </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="input-group mb-3">
            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Username" value="{{ username|default:'' }}" autofocus required>
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
            <input type="email" name="email" class="form-control" placeholder="Email (opsional)" value="{{ email|default:'' }}">
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>

        <div class="input-group mb-4">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" name="password2" class="form-control" placeholder="Konfirmasi Password" required>
        </div>

        <button type="submit" class="btn btn-lms-primary w-100 py-2 fw-semibold">
            <i class="bi bi-person-plus-fill me-1"></i>Daftar
        </button>
    </form>

    <p class="text-center lms-page-subtitle small mt-3 mb-0">
        Sudah punya akun? <a href="{% url 'login' %}">Login di sini</a>
    </p>

</div>

</body>
</html>
