{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login · LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="{% static 'lms/css/admin.css' %}" rel="stylesheet">

    <style>
        body.lms-login-bg {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, #312e81 0%, #111827 55%, #0b0f19 100%);
        }

        .lms-login-card {
            width: 100%;
            max-width: 380px;
            padding: 2.25rem 2rem;
        }

        .lms-login-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(79, 70, 229, 0.12);
            color: var(--c-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 1rem;
        }

        .lms-login-card .form-control {
            padding-top: 0.6rem;
            padding-bottom: 0.6rem;
        }

        .lms-login-card .input-group-text {
            background: #f9fafb;
            border-right: none;
            color: var(--c-text-muted);
        }

        .lms-login-card .form-control {
            border-left: none;
        }

        .lms-login-card .input-group:focus-within .input-group-text {
            border-color: var(--c-primary);
        }
    </style>
</head>
<body class="lms-login-bg">

<div class="lms-card lms-login-card">

    <div class="lms-login-avatar"><i class="bi bi-mortarboard-fill"></i></div>

    <h4 class="text-center lms-page-title mb-1">Simple LMS</h4>
    <p class="text-center lms-page-subtitle mb-4">Masuk untuk mengelola sistem pembelajaran</p>

    {% if form.errors %}
    <div class="alert alert-danger py-2 small">
        <i class="bi bi-exclamation-triangle-fill me-1"></i>
        Username atau password salah. Silakan coba lagi.
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="input-group mb-3">
            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Username" autofocus required>
        </div>

        <div class="input-group mb-4">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>

        <input type="hidden" name="next" value="{{ next }}">

        <button type="submit" class="btn btn-lms-primary w-100 py-2 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-1"></i>Login
        </button>
    </form>

</div>

</body>
</html>
