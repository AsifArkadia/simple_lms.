{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Edit Materi · {{ content.course.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="{% static 'lms/css/admin.css' %}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark lms-navbar shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand"><i class="bi bi-mortarboard-fill"></i>LMS Admin</span>
        <a href="{% url 'course_content_list' content.course.id %}" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i>Konten</a>
    </div>
</nav>

<div class="container mt-4 mb-5" style="max-width: 640px;">

    <h3 class="lms-page-title mb-1">Edit Materi</h3>
    <p class="lms-page-subtitle mb-4">Untuk course: <strong>{{ content.course.title }}</strong></p>

    <div class="lms-card">
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">Judul Materi</label>
                    <input type="text" name="title" class="form-control" value="{{ content.title }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Deskripsi / Body</label>
                    <textarea name="body" class="form-control" rows="4">{{ content.body }}</textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold"><i class="bi bi-youtube text-danger me-1"></i>Link Video YouTube (opsional)</label>
                    <input type="url" name="video_url" class="form-control" placeholder="https://www.youtube.com/watch?v=..." value="{{ content.video_url|default:'' }}">
                    <div class="form-text">Tempel link YouTube agar video tampil di halaman Materi Saya mahasiswa.</div>
                </div>

                <button class="btn btn-warning"><i class="bi bi-check-lg me-1"></i>Update</button>
                <a href="{% url 'course_content_list' content.course.id %}" class="btn btn-secondary">Kembali</a>
            </form>
        </div>
    </div>

</div>

</body>
</html>
